server:
  port: 8001
  name: elyte

management:
  server:
    port: 9090

logging:
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){green} %clr([%level]){magenta}  %c{1.} [%t] %m%n'
  level:
    org:
      springframework: INFO

springdoc:
  show-actuator: true
  use-management-port: true
  swagger-ui:
    operationsSorter: method
    path: /ui-custom.html
  api-docs:
    path: /api-docs

spring:
  output:
    ansi:
      enabled: always
    # Message Broker
  rabbitmq:
    host: ${RABBIT_HOST}
    port: 5672
    username: ${RABBITMQ_DEFAULT_USER}
    password: ${RABBITMQ_DEFAULT_PASS}

  # Maximum time static resources should be cached
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 12h

  #===============================
  # DATA SOURCE
  #===============================
  datasource:
    url: jdbc:mariadb://localhost:3306/elyte
    username: userExample
    password: 54321
    driver-class-name: org.mariadb.jdbc.Driver

    # ===============================
    # = JPA / HIBERNATE
    # ===============================
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create



